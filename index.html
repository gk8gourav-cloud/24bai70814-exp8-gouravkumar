<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Auth System - Exp 8</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans p-4">
    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // State Management
            const [view, setView] = useState('login'); 
            const [currentUser, setCurrentUser] = useState(JSON.parse(localStorage.getItem('currentUser')) || null);
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'user' });
            const [message, setMessage] = useState({ text: '', type: '' });

            // Initialize mock database (localStorage) if empty
            useEffect(() => {
                if (!localStorage.getItem('mockDatabase')) {
                    localStorage.setItem('mockDatabase', JSON.stringify([]));
                }
            }, []);

            // Redirect if already logged in
            useEffect(() => {
                if (currentUser && view !== 'dashboard') setView('dashboard');
            }, [currentUser]);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const showMessage = (text, type) => {
                setMessage({ text, type });
                setTimeout(() => setMessage({ text: '', type: '' }), 3000);
            };

            // --- MOCK BACKEND LOGIC ---

            const handleRegister = (e) => {
                e.preventDefault();
                const db = JSON.parse(localStorage.getItem('mockDatabase'));
                
                // Check if user exists
                if (db.find(u => u.email === formData.email)) {
                    showMessage("User with this email already exists!", "error");
                    return;
                }

                // Save new user
                const newUser = { 
                    id: Date.now(), 
                    name: formData.name, 
                    email: formData.email, 
                    password: formData.password, // In a real app, this would be hashed
                    role: formData.role 
                };
                
                db.push(newUser);
                localStorage.setItem('mockDatabase', JSON.stringify(db));
                
                showMessage("Registration successful! Please login.", "success");
                setView('login');
                setFormData({ name: '', email: '', password: '', role: 'user' });
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const db = JSON.parse(localStorage.getItem('mockDatabase'));
                
                const user = db.find(u => u.email === formData.email && u.password === formData.password);
                
                if (user) {
                    // Simulate JWT Token creation
                    const mockToken = "jwt_token_" + Date.now();
                    const userData = { id: user.id, name: user.name, role: user.role, token: mockToken };
                    
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    setCurrentUser(userData);
                    setView('dashboard');
                    setFormData({ name: '', email: '', password: '', role: 'user' });
                } else {
                    showMessage("Invalid email or password", "error");
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                setCurrentUser(null);
                setView('login');
            };

            // --- RENDER VIEWS ---

            if (view === 'dashboard' && currentUser) {
                const db = JSON.parse(localStorage.getItem('mockDatabase'));

                return (
                    <div className="bg-white p-8 rounded-xl shadow-lg w-full">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h2 className="text-2xl font-bold text-gray-800">Secure Dashboard</h2>
                            <button onClick={handleLogout} className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md transition shadow">Logout</button>
                        </div>
                        
                        <div className="bg-indigo-50 border border-indigo-100 p-6 rounded-lg mb-6 flex items-center justify-between">
                            <div>
                                <p className="text-xl text-indigo-900">Welcome back, <span className="font-bold">{currentUser.name}</span></p>
                                <p className="text-indigo-700 mt-1 flex items-center gap-2">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                    Access Level: <strong className="uppercase">{currentUser.role}</strong>
                                </p>
                            </div>
                        </div>

                        {/* ROLE BASED ACCESS CONTROL (RBAC) UI */}
                        <div className="border border-gray-200 p-6 rounded-lg bg-gray-50">
                            <h3 className="font-bold text-lg mb-4 text-gray-800">Protected Resources</h3>
                            
                            {currentUser.role === 'admin' ? (
                                <div>
                                    <p className="text-green-700 font-medium mb-4 flex items-center gap-2">
                                        <span>✅</span> Admin Privileges: You have access to all system data.
                                    </p>
                                    <div className="bg-white rounded border overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-gray-100 border-b">
                                                <tr>
                                                    <th className="p-3">User ID</th>
                                                    <th className="p-3">Name</th>
                                                    <th className="p-3">Email</th>
                                                    <th className="p-3">Role</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {db.map((u, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50">
                                                        <td className="p-3 text-sm text-gray-500">...{u.id.toString().slice(-4)}</td>
                                                        <td className="p-3 font-medium">{u.name}</td>
                                                        <td className="p-3 text-gray-600">{u.email}</td>
                                                        <td className="p-3">
                                                            <span className={`px-2 py-1 rounded text-xs font-bold uppercase ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                                                                {u.role}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : (
                                <div>
                                    <p className="text-gray-700 mb-4 flex items-center gap-2">
                                        <span>🔒</span> Standard User Privileges: Viewing personal profile data only.
                                    </p>
                                    <div className="bg-white p-4 rounded border shadow-sm max-w-sm">
                                        <p className="text-sm text-gray-500 mb-1">Your Mock JWT Token:</p>
                                        <code className="text-xs break-all bg-gray-100 p-2 rounded block text-indigo-600">
                                            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.{currentUser.token}.mockSignature
                                        </code>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
                    <div className="text-center mb-8">
                        <h2 className="text-3xl font-extrabold text-gray-900">{view === 'login' ? 'Welcome Back' : 'Create Account'}</h2>
                        <p className="text-gray-500 mt-2">Full Stack Auth System (Exp 8)</p>
                    </div>
                    
                    {message.text && (
                        <div className={`p-3 rounded mb-6 text-sm font-medium ${message.type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                            {message.text}
                        </div>
                    )}
                    
                    <form onSubmit={view === 'login' ? handleLogin : handleRegister} className="space-y-5">
                        {view === 'register' && (
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <input type="text" name="name" value={formData.name} onChange={handleChange} required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                            </div>
                        )}
                        
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                            <input type="email" name="email" value={formData.email} onChange={handleChange} required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                        </div>
                        
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" name="password" value={formData.password} onChange={handleChange} required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                        </div>

                        {view === 'register' && (
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Assign Role (RBAC)</label>
                                <select name="role" value={formData.role} onChange={handleChange} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                                    <option value="user">Standard User</option>
                                    <option value="admin">Administrator</option>
                                </select>
                            </div>
                        )}
                        
                        <button type="submit" className="w-full bg-indigo-600 text-white font-bold p-3 rounded-lg hover:bg-indigo-700 transition shadow-md">
                            {view === 'login' ? 'Sign In' : 'Register Now'}
                        </button>
                    </form>
                    
                    <div className="mt-6 text-center">
                        <button 
                            onClick={() => { setView(view === 'login' ? 'register' : 'login'); setMessage({text: '', type: ''}); }} 
                            className="text-indigo-600 hover:text-indigo-800 font-medium transition"
                        >
                            {view === 'login' ? 'Need an account? Register here' : 'Already have an account? Sign in'}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
